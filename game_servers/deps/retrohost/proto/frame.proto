syntax = "proto3";

package red;

message Geometry {
    enum Attrs {
        ATTR_NONE = 0x00;
        ATTR_ROT180 = 0x01;
    }
    enum PixelFormat {
        PF_UNKNOWN = 0;
        PF_RGB565 = 1;
        PF_RGBA8888 = 2;
        PF_RGBA5551 = 3;
        PF_ARGB8888 = 4;
    }
    uint32 pitch = 1;
    uint32 width = 2;
    uint32 height = 3;
    PixelFormat pixel_format = 4;
    uint32 attrs = 5;
}

message Frame {
    Geometry geometry = 1;
    bytes content = 2;
}
