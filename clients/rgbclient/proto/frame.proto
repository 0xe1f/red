syntax = "proto3";

package red;

message Frame {
    enum Attrs {
        ATTR_NONE = 0x00;
        ATTR_ROT180 = 0x01;
    }
    enum PixelFormat {
        PF_UNKNOWN = 0;
        PF_RGB565 = 1;
        PF_RGBA8888 = 2;
        PF_RGBA5551 = 3;
        PF_ARGB8888 = 4;
    }
    bytes content = 1;
    uint32 pitch = 2;
    uint32 width = 3;
    uint32 height = 4;
    PixelFormat pixel_format = 5;
    uint32 attrs = 6;
}
